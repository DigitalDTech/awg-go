name: Build Debian Packages

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package_name:
        description: Optional Debian package name override
        required: false
        type: string
      package_version:
        description: Optional Debian package version override
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build .deb packages
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    env:
      PACKAGE_NAME: ${{ github.event.inputs.package_name || 'ddt-awg' }}
      PACKAGE_VERSION: ${{ github.event.inputs.package_version || '' }}
      MAINTAINER: AWG Build Workflow <41898282+github-actions[bot]@users.noreply.github.com>

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: amneziawg-go/go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            dpkg-dev \
            fakeroot \
            gcc-aarch64-linux-gnu \
            pkg-config \
            shellcheck \
            systemd

      - name: Lint packaging script
        run: shellcheck packaging/build-deb.sh

      - name: Build package
        run: ./packaging/build-deb.sh "${{ matrix.arch }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-${{ matrix.arch }}
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debian-package-*
          merge-multiple: true
          path: release-assets

      - name: Publish .deb files to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-assets/*.deb --repo "${GH_REPO}" --clobber
          else
            gh release create "${tag}" release-assets/*.deb \
              --repo "${GH_REPO}" \
              --title "${tag}" \
              --notes "Automated Debian package release for ${tag}."
          fi
